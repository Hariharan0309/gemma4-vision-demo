<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemma 4 Vision</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f11;
      color: #e8e8ea;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #8b7cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: #6b6b78;
      font-size: 0.9rem;
      margin-top: 0.4rem;
    }

    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #3f3f46;
      border-radius: 12px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone.drag-over {
      border-color: #8b7cf8;
      background: #1e1b2e;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-zone .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      line-height: 1;
    }

    .drop-zone p {
      color: #71717a;
      font-size: 0.875rem;
    }

    .drop-zone p strong {
      color: #a78bfa;
    }

    /* Preview */
    #preview-wrap {
      display: none;
      position: relative;
    }

    #preview-wrap img {
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid #27272a;
      background: #09090b;
    }

    #clear-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #27272a;
      border: none;
      color: #a1a1aa;
      font-size: 1rem;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    #clear-btn:hover { background: #3f3f46; color: #e4e4e7; }

    /* Question */
    .question-row {
      display: flex;
      gap: 0.75rem;
    }

    #question {
      flex: 1;
      background: #09090b;
      border: 1px solid #3f3f46;
      border-radius: 10px;
      color: #e8e8ea;
      font-size: 0.925rem;
      padding: 0.75rem 1rem;
      resize: none;
      height: 56px;
      line-height: 1.5;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    #question:focus {
      outline: none;
      border-color: #7c3aed;
    }

    #question::placeholder { color: #52525b; }

    #submit-btn {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0 1.4rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      font-family: inherit;
    }

    #submit-btn:hover:not(:disabled) { opacity: 0.9; }
    #submit-btn:active:not(:disabled) { transform: scale(0.97); }
    #submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Answer */
    #answer-wrap {
      display: none;
    }

    #answer-wrap label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #52525b;
      display: block;
      margin-bottom: 0.5rem;
    }

    #answer {
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 10px;
      padding: 1rem 1.1rem;
      font-size: 0.925rem;
      line-height: 1.75;
      color: #d4d4d8;
      white-space: pre-wrap;
      min-height: 80px;
    }

    /* Status */
    #status {
      font-size: 0.8rem;
      color: #6b6b78;
      text-align: center;
      min-height: 1.2em;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #3f3f46;
      border-top-color: #8b7cf8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: #3f3f46;
      text-align: center;
    }

    footer a { color: #6d28d9; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>Gemma 4 Vision</h1>
  <p>Upload an image, ask a question, get an answer — fully open source.</p>
</header>

<div class="card">

  <!-- Drop zone / file picker -->
  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept="image/*" />
    <div class="icon">🖼️</div>
    <p><strong>Click to upload</strong> or drag &amp; drop</p>
    <p>PNG, JPG, WEBP, GIF — any image</p>
  </div>

  <!-- Preview -->
  <div id="preview-wrap">
    <img id="preview" src="" alt="Preview" />
    <button id="clear-btn" title="Remove image">✕</button>
  </div>

  <!-- Question -->
  <div class="question-row">
    <textarea
      id="question"
      placeholder="What does this image show? Explain it to a beginner."
    ></textarea>
    <button id="submit-btn" disabled>Ask</button>
  </div>

  <!-- Status -->
  <div id="status"></div>

  <!-- Answer -->
  <div id="answer-wrap">
    <label>Answer</label>
    <div id="answer"></div>
  </div>

</div>

<footer>
  Powered by <a href="https://ollama.com" target="_blank">Ollama</a> &amp;
  <a href="https://ai.google.dev/gemma" target="_blank">Gemma 4</a> — Apache 2.0
</footer>

<script>
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const previewWrap= document.getElementById('preview-wrap');
  const preview    = document.getElementById('preview');
  const clearBtn   = document.getElementById('clear-btn');
  const question   = document.getElementById('question');
  const submitBtn  = document.getElementById('submit-btn');
  const status     = document.getElementById('status');
  const answerWrap = document.getElementById('answer-wrap');
  const answer     = document.getElementById('answer');

  let selectedFile = null;

  function setFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    selectedFile = file;
    const url = URL.createObjectURL(file);
    preview.src = url;
    dropZone.style.display = 'none';
    previewWrap.style.display = 'block';
    updateSubmit();
  }

  function clearFile() {
    selectedFile = null;
    preview.src = '';
    fileInput.value = '';
    previewWrap.style.display = 'none';
    dropZone.style.display = 'block';
    updateSubmit();
  }

  function updateSubmit() {
    submitBtn.disabled = !(selectedFile && question.value.trim());
  }

  fileInput.addEventListener('change', () => setFile(fileInput.files[0]));
  clearBtn.addEventListener('click', clearFile);
  question.addEventListener('input', updateSubmit);

  // Drag & drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    setFile(e.dataTransfer.files[0]);
  });

  // Ctrl/Cmd+Enter to submit
  question.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submitBtn.click();
  });

  submitBtn.addEventListener('click', async () => {
    if (!selectedFile || !question.value.trim()) return;

    submitBtn.disabled = true;
    answerWrap.style.display = 'none';
    answer.textContent = '';
    status.innerHTML = '<span class="spinner"></span> Thinking…';

    const form = new FormData();
    form.append('image', selectedFile, selectedFile.name);
    form.append('question', question.value.trim());

    try {
      const resp = await fetch('/ask', { method: 'POST', body: form });

      if (!resp.ok) {
        const text = await resp.text();
        throw new Error(`Server error ${resp.status}: ${text}`);
      }

      answerWrap.style.display = 'block';
      status.textContent = '';

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        answer.textContent += decoder.decode(value, { stream: true });
      }

      status.textContent = 'Done.';
    } catch (err) {
      status.textContent = '⚠ ' + err.message;
    } finally {
      submitBtn.disabled = !(selectedFile && question.value.trim());
    }
  });
</script>

</body>
</html>
